<svg xmlns="http://www.w3.org/2000/svg" width="780" height="40" viewBox="0 0 780 40" role="img" aria-labelledby="title desc">
  <title id="title">ProjectDeadEnd status header</title>
  <desc id="desc">A row of playful status badges showing that the project is under wraps and not yet public.</desc>

  <g transform="translate(0 5)">
    <rect width="146" height="30" rx="15" fill="#8b1e3f" />
    <text x="73" y="20" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle">UNDER WRAPS</text>
  </g>

  <g transform="translate(158 5)">
    <rect width="136" height="30" rx="15" fill="#5f0f40" />
    <text x="68" y="20" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle">NOT PUBLIC</text>
  </g>

  <g transform="translate(306 5)">
    <rect width="120" height="30" rx="15" fill="#355070" />
    <text x="60" y="20" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle">DEAD END</text>
  </g>

  <g transform="translate(438 5)">
    <rect width="162" height="30" rx="15" fill="#b56576" />
    <text x="81" y="20" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle">OPENING LATER</text>
  </g>

  <g transform="translate(612 5)">
    <rect width="168" height="30" rx="15" fill="#6d597a" />
    <text x="84" y="20" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle">CURTAIN CLOSED</text>
  </g>
</svg>
